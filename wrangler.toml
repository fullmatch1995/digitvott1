name = "digitvott1"
main = "src/index.ts"
compatibility_date = "2024-03-02"
compatibility_flags = ["nodejs_compat"]

# After running: wrangler d1 create projekti-im-db
# paste the returned database_id below
[[d1_databases]]
binding = "DB"
database_name = "digitvott-db"
database_id = "7c888817-2ace-42fa-822c-b9cb63691d97"

# Set JWT secret with: wrangler secret put JWT_SECRET
# Never put secrets directly in this file

# Vite build output served as static assets
[assets]
directory = "./dist/public"
[[kv_namespaces]]
binding = "MY_KV"
id = "13711284f6004cf48fe6b37aab1b7673"
